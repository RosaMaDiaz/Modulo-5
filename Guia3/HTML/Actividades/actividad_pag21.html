<!DOCTYPE html>
<html>
<head>
    <title>Actividad para agregar video</title>
</head>
<body>

    <h2>Mis video, Google Maps y PDF</h2>
    
    <main>
        <section>
            <h2>Qué es y para qué sirve Iframe en HTML: Todo sobre esta etiqueta</h2>
            <iframe 
                src="https://www.youtube.com/embed/Pixf6U7x-18?si=x47o25GDvmQ3xatQ"
                width="100%" 
                height="315" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
            </iframe>
        </section>

        <hr>

        <section>
            <h2>Poner un Google Map</h2>
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d193595.15830869428!2d-74.119763973046!3d40.69766374874431!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c24fa5d33f083b%3A0xc80b8f06e177fe62!2sNueva%20York%2C%20EE.%20UU.!5e0!3m2!1ses!2sdo!4v1714080000000!5m2!1ses!2sdo" 
                width="100%" 
                height="450" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>

        <hr> 

        <section>
            <h2>Insertar un PDF</h2>
            <iframe src="Guia 3 Modulo 5.pdf" width="100%" height="600"></iframe>
        </section>
        
    </main>

    <footer>
        <hr>
        <p>Actividad para agregar video, Guia 3 Módulo 5</p>
        <p>Realizada por: Rosa Diaz</p>
        <p>Derecho reservado 2026</p>
    </footer>

</body>
</html>
