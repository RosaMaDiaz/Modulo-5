<!DOCTYPE html>

<body>
    <h1>Ejemplos de Tablas Sencillas</h1>
    <table border="1">
        <tr>
            <th>País</th>
            <th>Capital</th>
        </tr>
        <tr>
            <td>República Dominicana</td>
            <td>Santo Domingo</td>
        </tr>
        <tr>
            <td>Guatemala</td>
            <td>Ciudad de Guatemala</td>
        </tr>
    </table>
        <br><br>
    <h2>Tablas con Combinación de Columnas</h2>
    <table border="1">
        <tr>
            <th colspan="2">Información</th>
            
        </tr>
        <tr>
            <td>Nombre</td>
            <td>Edad</td>
        </tr>
    </table>

</body>
