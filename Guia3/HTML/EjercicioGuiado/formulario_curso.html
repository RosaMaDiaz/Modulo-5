<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
</head>
<body>
<h1>Formulario de Registro</h1>

<form>
    <label>Nombre:</label>
    <input type="text" placeholder="Escribe tu nombre">
    <br><br>

    <label>Selecciona tu curso:</label>
    <select>
        <option>--Seleccione--</option>

        <optgroup label="Programación">
            <option>Programación Web</option>
            <option>Programación en C#</option>
        </optgroup>

        <optgroup label="Matemáticas">
            <option>Matemática Discreta</option>
            <option>Álgebra</option>
        </optgroup>

        <optgroup label="Idiomas">
            <option>Inglés</option>
            <option>Francés</option>
        </optgroup>

    </select>
</form>

</body>
</html>
