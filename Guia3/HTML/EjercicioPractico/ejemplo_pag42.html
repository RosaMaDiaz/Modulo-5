<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplos de Formularios HTML</title>
</head>
<body>
    <h1>Formulario de Registro</h1>
    <input type="text" placeholder="Ingrese su nombre">
    <input type="email" placeholder="Correo electrónico">
    <input type="submit" value="Enviar">
    
    <br>
    <h3>Uso de la etiqueta label</h3>
    <label>Nombre:</label>
    <input type="text" placeholder="Text">

    <br>
    <h3>Uso de la etiqueta Select</h3>
    <select>
        <option value="Programación">Programación</option>
        <option value="BAse de Datos">Base de Datos</option>
        
    </select>

    <br>
    <h3>Uso de la etiqueta Textarea</h3>
    <label>Comentarios:</label>
    <textarea id="comentario" name="comentario" rows="4" cols="30"></textarea>

    <br>
    <h3>Uso de la etiqueta fieldset</h3>
    <fieldset>
        <legend>Datos Personales</legend>
          <input type="text"><br><br>
    </fieldset>


       

</body>
</html>
