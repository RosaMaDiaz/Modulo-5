<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregando vículos e imágenes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
</head>
<body>

    <h1>Ejemplo de vínculos e imágenes</h1>
    <!-- Vículo -->
     
        
        <p>Visita nuestra página favorita:
            <a href="https://oregoom.com/html/base/#" target="_blank">Ir a Ejemplo.com</a>

        </p>
        
        <!-- imagen -->
    
        <p> Esta es una imagen de ejemplos:</p>
        <img src="\imagenes\fresas.jpg" alt="Imagen de ejemplo" width="300">

    
    <!-- Combinación: Imagen como enlace  -->
     
        <p>Haz clic en la imagen para ir a la página</p>
        <a href="https://todosobrefrutas.com/" target="_blank">
            <img src="\imagenes\fresas.jpg" alt="Imagen Enlazada" Width="300">
        </a>
        <p> <abbr title="HyperText Markup Language">HTML</abbr> es un lenguaje de marcado.</p>
    
</body>
</html>
