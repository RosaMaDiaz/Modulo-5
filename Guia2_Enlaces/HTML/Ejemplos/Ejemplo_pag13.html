<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcado Avanzado</title>
</head>
<body>
    
    <h1>Ejemplo de texto Avanzado</h1>
    
    <p>Este es un<strong>mensaje importante</strong>.</p>
    <p>Este texto tiene <em>énfasis</em>.</p>

    <p><b>Negrita</b>, <i>Cursiva</i> y <ins>Subrayado</ins>.</p>

    <p> Fórmula química: H<sub>2</sub>O</p>
    <p>Operación Matemática: 2<sup>3</sup> = 8</p>

    <blockquote>
        "Apreder a programar es aprender a pensar."
    </blockquote>
    
</body>
</html>
